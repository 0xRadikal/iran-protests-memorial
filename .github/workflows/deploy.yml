name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# فقط یک استقرار هم‌زمان
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # به‌روزرسانی خودکار lastmod در sitemap به تاریخ روز استقرار (SEO: تازگی محتوا)
      - name: Refresh sitemap lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i -E "s#<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>#<lastmod>${TODAY}</lastmod>#g" sitemap.xml
          echo "sitemap lastmod → ${TODAY}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # کل مخزن (سایت استاتیک) منتشر می‌شود
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
